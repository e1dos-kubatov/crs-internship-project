<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Rental System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="data:image/x-icon;base64,">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8 text-center">
                <h1 class="display-4 mb-4">🚗 Car Rental System</h1>
                <p class="lead mb-5">Welcome! Login with GitHub or Google to rent cars.</p>
                <div class="d-grid gap-3 col-6 mx-auto">
                    <a href="/oauth2/authorization/github" class="btn btn-outline-dark btn-lg">
                        <i class="fab fa-github me-2"></i> Login with GitHub
                    </a>
                    <a href="/oauth2/authorization/google" class="btn btn-danger btn-lg">
                        <i class="fab fa-google me-2"></i> Login with Google
                    </a>
                </div>
                <p class="mt-4 text-muted">React Frontend: <a href="http://localhost:5173">localhost:5173</a> | API: <a href="http://localhost:8083/api/cars">Cars API</a></p>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://kit.fontawesome.com/a076d05399.js"></script>
</body>
</html>
